[phases.setup]
nixPkgs = ["php82", "php82Extensions.pgsql", "php82Extensions.mbstring", "php82Extensions.xml", "php82Extensions.curl", "php82Extensions.zip", "php82Extensions.gd", "php82Extensions.bcmath", "php82Extensions.tokenizer", "php82Extensions.dom", "composer", "nodejs", "npm"]

[phases.build]
cmds = [
  "composer install --no-dev --optimize-autoloader --ignore-platform-reqs",
  "npm ci",
  "npm run build"
]

[start]
cmd = "php artisan config:clear && php artisan migrate --force && php artisan db:seed --force && php artisan serve --host=0.0.0.0 --port=$PORT"